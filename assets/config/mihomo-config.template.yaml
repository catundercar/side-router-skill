allow-lan: true
bind-address: "*"
external-controller: 0.0.0.0:9090
mixed-port: 7890
mode: rule
log-level: warning
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "youku.com"
    - "+.youku.com"
    - "ykimg.com"
    - "+.ykimg.com"
    - "iqiyi.com"
    - "+.iqiyi.com"
    - "bilibili.com"
    - "+.bilibili.com"
    - "qq.com"
    - "+.qq.com"
    - "tencent.com"
    - "+.tencent.com"
    - "qpic.cn"
    - "+.qpic.cn"
    - "gtimg.com"
    - "+.gtimg.com"
    - "voice.gtimg.com"
    - "+.voice.gtimg.com"
  use-hosts: true
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

proxy-providers:
  my-subscription:
    type: http
    url: "https://example.com/subscription?token=REDACTED"
    path: ./providers/my-subscription.yaml
    interval: 21600
    health-check:
      enable: true
      interval: 600
      lazy: true
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: AI_US
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - my-subscription
    filter: "(?i)(台湾|美国|Taiwan|TW|US|USA|United[ _-]?States)"

  - name: DEFAULT_AUTO
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 50
    use:
      - my-subscription
    filter: "(?i)(台湾|美国|Taiwan|TW|US|USA|United[ _-]?States)"

  - name: DEFAULT
    type: select
    proxies:
      - DEFAULT_AUTO
      - DIRECT

rules:
  - DOMAIN-SUFFIX,claude.ai,AI_US
  - DOMAIN-SUFFIX,anthropic.com,AI_US
  - DOMAIN-SUFFIX,claudeusercontent.com,AI_US
  - DOMAIN-SUFFIX,openai.com,AI_US
  - DOMAIN-SUFFIX,chatgpt.com,AI_US
  - DOMAIN-SUFFIX,oaistatic.com,AI_US
  - DOMAIN-SUFFIX,oaiusercontent.com,AI_US
  - DOMAIN-SUFFIX,cursor.com,AI_US
  - DOMAIN-SUFFIX,cursor.sh,AI_US
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT
  - DOMAIN-SUFFIX,qpic.cn,DIRECT
  - DOMAIN-SUFFIX,gtimg.com,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,DEFAULT
